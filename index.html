<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dash is gay</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* Dark, shifting Pride background */
      /* It cycles through very deep, almost-black versions of the rainbow */
      background: linear-gradient(135deg, #1a0004, #1a0a00, #1a1700, #001a07, #00081a, #11001a, #1a0004);
      background-size: 400% 400%;
      animation: bgShift 12s ease infinite;
      
      /* A very clean, bold, modern font */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Slowly pans the dark background colors */
    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 25vw; /* Massive size */
      font-weight: 900;
      text-align: center;
      margin: 0;
      line-height: 1.1;
      letter-spacing: -2px;

      /* The Discord Role Effect: fast, seamless, bright Pride rainbow */
      background: linear-gradient(
        to right, 
        #ff0018, /* Red */
        #ffa52c, /* Orange */
        #ffff41, /* Yellow */
        #008018, /* Green */
        #0000f9, /* Blue */
        #86007d, /* Purple */
        #ff0018  /* Loops back to Red perfectly */
      );
      background-size: 200% auto;
      
      /* Clips the gradient exclusively to the text shape */
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;

      /* The shining sweep animation */
      animation: shine 2.5s linear infinite;

      /* Heavy drop shadow to make the text pop off the dark background */
      filter: drop-shadow(0px 10px 25px rgba(0, 0, 0, 0.95));
    }

    /* Pushes the gradient infinitely to the left to create the shine */
    @keyframes shine {
      to {
        background-position: -200% center;
      }
    }
  </style>
</head>
<body>
  <h1>dash<br>is gay</h1>
</body>
</html>
