<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>shu is good</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050508;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let touch = { x: null, y: null, active: false };

    // Resize canvas for mobile screens
    function resize() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      initParticles();
    }

    class Particle {
      constructor(x, y, color) {
        this.targetX = x;
        this.targetY = y;
        // Start them slightly scattered so they assemble nicely
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y + (Math.random() - 0.5) * 10;
        this.baseSize = Math.random() * 2.5 + 2; // Size of individual dots
        this.size = this.baseSize;
        this.color = color;
        // Subtle floating movement speed
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 0.5 + 0.2;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        
        // Add a brilliant neon glow to each dot
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0; // Reset shadow for performance
      }

      update() {
        // Organic idle floating motion
        this.angle += 0.02;
        let driftX = Math.cos(this.angle) * this.speed;
        let driftY = Math.sin(this.angle) * this.speed;

        let currentTargetX = this.targetX + driftX;
        let currentTargetY = this.targetY + driftY;

        // Smoothly ease toward target floating position
        this.x += (currentTargetX - this.x) * 0.1;
        this.y += (currentTargetY - this.y) * 0.1;

        // Reactive logic: Grow dots when finger gets close
        if (touch.active && touch.x !== null) {
          let dx = touch.x - this.x;
          let dy = touch.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 70) {
            this.size = this.baseSize * (1 + (70 - distance) / 35);
          } else {
            this.size = this.baseSize;
          }
        } else {
          this.size = this.baseSize;
        }
      }
    }

    function initParticles() {
      particles = [];
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Create a hidden canvas to snapshot the text pixels
      const tCanvas = document.createElement('canvas');
      const tCtx = tCanvas.getContext('2d');
      tCanvas.width = w;
      tCanvas.height = h;

      // Text styling inside snapshot
      const fontSize = Math.min(w * 0.22, 110);
      tCtx.font = `900 ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
      tCtx.textAlign = 'center';
      tCtx.textBaseline = 'middle';
      tCtx.fillStyle = 'white';

      // Draw text stacked vertically for mobile layouts
      tCtx.fillText('dash', w / 2, h / 2 - fontSize * 0.6);
      tCtx.fillText('is gay', w / 2, h / 2 + fontSize * 0.6);

      // Scan the text pixels
      const imgData = tCtx.getImageData(0, 0, w, h).data;
      
      // Control how dense the particles are (gap between dots)
      const gap = Math.min(6, Math.max(4, Math.floor(w / 80)));

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const index = (y * w + x) * 4;
          const alpha = imgData[index + 3];

          if (alpha > 128) {
            // Generate shifting colors across the screen width (Cyan -> Purple -> Pink)
            const ratio = x / w;
            let color;
            if (ratio < 0.4) color = '#00f0ff';       // Vibrant Cyan
            else if (ratio < 0.7) color = '#8a2be2';  // Deep Purple
            else color = '#ff007a';                   // Neon Pink

            particles.push(new Particle(x, y, color));
          }
        }
      }
    }

    function animate() {
      // Create a reactive, trailing dark fluid background instead of a harsh clear
      ctx.fillStyle = 'rgba(5, 5, 8, 0.25)';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // Draw a subtle reactive background ambient light following the touch pointer
      if (touch.active && touch.x !== null) {
        let gradient = ctx.createRadialGradient(touch.x, touch.y, 10, touch.x, touch.y, 130);
        gradient.addColorStop(0, 'rgba(138, 43, 226, 0.15)');
        gradient.addColorStop(1, 'rgba(5, 5, 8, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      }

      // Update and draw each word particle
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }

      requestAnimationFrame(animate);
    }

    // Touch and Mobile Gesture Event Listeners
    window.addEventListener('touchstart', (e) => {
      touch.active = true;
      touch.x = e.touches[0].clientX;
      touch.y = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      touch.x = e.touches[0].clientX;
      touch.y = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', () => {
      touch.active = false;
      touch.x = null;
      touch.y = null;
    });

    window.addEventListener('resize', resize);
    
    // Fire it up
    resize();
    animate();
  </script>
</body>
</html>
