<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shu is good</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* Dark gradient background (deep grey/blue fading to pure black) */
      background: radial-gradient(circle at center, #1a1c23 0%, #06070a 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .container {
      /* Adds a subtle glowing aura behind the 3D dots */
      filter: drop-shadow(0px 15px 25px rgba(0, 0, 0, 0.9));
    }

    h1 {
      font-size: 24vw; /* Massive size to fill phone screen */
      font-weight: 900;
      text-align: center;
      margin: 0;
      line-height: 1.1;
      letter-spacing: -2px;

      /* 1. Shifting neon color gradient */
      background: linear-gradient(90deg, #ff007a, #7a00ff, #00f0ff, #ff007a);
      background-size: 300% 100%;
      animation: colorShift 4s linear infinite;

      /* 2. Clip the colors to the text shape */
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

      /* 3. The Dot Pattern Mask (makes the text look made of particles) */
      -webkit-mask-image: radial-gradient(circle, black 45%, transparent 50%);
      -webkit-mask-size: 10px 10px; /* Adjust this to make dots bigger/smaller */
      mask-image: radial-gradient(circle, black 45%, transparent 50%);
      mask-size: 10px 10px;

      /* 4. 3D Pop (shadow applied to the individual dots) */
      filter: drop-shadow(3px 4px 2px rgba(0, 0, 0, 0.8));
    }

    /* Animation to move the colors smoothly */
    @keyframes colorShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>shu<br>is good</h1>
  </div>
</body>
</html>
